<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>Article - BiRan INEV</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="article">

  <!-- ========== Navigation Bar ========== -->
  <nav class="nav-bar">
    <div class="nav-left">
      <button class="btn-back" id="btn-back" aria-label="返回">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
    </div>
    <span class="nav-center">Article</span>
    <div class="nav-right">
      <button class="btn-nav-circle" id="btn-edit-article" aria-label="编辑">E</button>
      <button class="btn-nav-icon" id="btn-edit-pencil" aria-label="编辑">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path>
        </svg>
      </button>
      <button class="btn-nav-icon" id="btn-close-article" aria-label="关闭">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="6" y1="6" x2="18" y2="18"></line>
          <line x1="18" y1="6" x2="6" y2="18"></line>
        </svg>
      </button>
    </div>
  </nav>

  <!-- ========== Divider ========== -->
  <div class="divider"></div>

  <!-- ========== Article Detail ========== -->
  <article class="article-detail page-enter">
    <h1 class="article-detail-title" id="article-title"></h1>
    <time class="article-detail-date" id="article-date"></time>
    <div class="article-detail-content" id="article-content"></div>
  </article>

  <script src="js/app.js"></script>
</body>
</html>
