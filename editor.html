<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>新建文章 - BiRan INEV</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="editor">

  <!-- ========== Navigation Bar ========== -->
  <nav class="nav-bar">
    <div class="nav-left">
      <button class="btn-back" id="btn-back-editor" aria-label="返回">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
    </div>
    <span class="nav-center" id="nav-editor-title">新建文章</span>
    <div class="nav-right">
      <button class="btn-publish" id="btn-publish">发布</button>
      <button class="btn-nav-icon" id="btn-close-editor" aria-label="关闭">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="6" y1="6" x2="18" y2="18"></line>
          <line x1="18" y1="6" x2="6" y2="18"></line>
        </svg>
      </button>
    </div>
  </nav>

  <!-- ========== Divider ========== -->
  <div class="divider"></div>

  <!-- ========== Editor ========== -->
  <main class="editor-container page-enter">
    <input
      type="text"
      class="editor-title-input"
      id="editor-title"
      placeholder="文章标题"
    >

    <div class="editor-toolbar">
      <button class="btn-camera" aria-label="插入图片">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
          <circle cx="12" cy="13" r="4"></circle>
        </svg>
      </button>
    </div>

    <textarea
      class="editor-content"
      id="editor-content"
      placeholder="开始写作..."
    ></textarea>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
