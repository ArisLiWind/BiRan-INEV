<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FFFFFF">
  <title>BiRan INEV</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="index">

  <!-- ========== Top Navigation Bar ========== -->
  <nav class="top-nav">
    <div class="top-nav-left">
      <button class="btn-hamburger" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
      <span class="top-nav-brand">BiRan INEV</span>
    </div>
    <div class="top-nav-right">
      <button class="btn-lang" aria-label="Switch Language">中文</button>
      <!-- Guest State -->
      <div id="nav-guest">
        <button class="btn-nav-login" id="btn-open-login" data-i18n="login">Login</button>
      </div>
      <!-- Logged-in State -->
      <div id="nav-logged" class="hidden" style="display:none;align-items:center;gap:8px;">
        <button class="btn-nav-icon" id="btn-new-post" aria-label="New Post">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
        <div class="nav-user-avatar" id="user-avatar">AL</div>
        <button class="btn-nav-icon" id="btn-logout" aria-label="Logout">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- ========== Articles List ========== -->
  <main class="articles-section">
    <div class="articles-list" id="articles-list"></div>
  </main>

  <!-- ========== Login Modal ========== -->
  <div class="modal-overlay" id="login-modal">
    <div class="modal-card">
      <h2 class="modal-title" data-i18n="login">Login</h2>
      <div class="form-group">
        <input type="text" class="form-input" id="input-username"
               data-i18n-placeholder="username" placeholder="Username" autocomplete="username">
      </div>
      <div class="form-group">
        <input type="password" class="form-input" id="input-password"
               data-i18n-placeholder="password" placeholder="Password" autocomplete="current-password">
      </div>
      <div class="modal-actions">
        <button class="btn-modal-cancel" id="btn-modal-cancel" data-i18n="cancel">Cancel</button>
        <button class="btn-modal-login" id="btn-modal-submit" data-i18n="login">Login</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
