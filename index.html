<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>BiRan INEV</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="index">

  <!-- ========== Hero Section - Guest State ========== -->
  <section class="hero" id="hero-guest">
    <div class="hero-bg">
      <div class="hero-bg-gradient"></div>
    </div>

    <!-- Top: Close + Lang -->
    <div class="hero-top">
      <button class="btn-lang" aria-label="Switch Language">中文</button>
      <button class="btn-close-white" aria-label="关闭">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round">
          <line x1="6" y1="6" x2="18" y2="18"></line>
          <line x1="18" y1="6" x2="6" y2="18"></line>
        </svg>
      </button>
    </div>

    <!-- Bottom: Brand + Actions -->
    <div class="hero-bottom">
      <div class="brand-name">
        BiRan INEV
        <span>BLOG</span>
      </div>
      <div class="hero-actions">
        <button class="btn-circle" aria-label="评论">C</button>
        <button class="btn-login" id="btn-open-login" data-i18n="login">Login</button>
      </div>
    </div>
  </section>

  <!-- ========== Hero Section - Logged-in State ========== -->
  <section class="hero hidden" id="hero-logged">
    <div class="hero-bg">
      <div class="hero-bg-gradient"></div>
    </div>

    <!-- Top bar overlay -->
    <div class="hero-topbar-logged">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="topbar-brand">BiRan INEV</div>
        <button class="btn-lang" aria-label="Switch Language">中文</button>
      </div>
      <div class="topbar-actions">
        <button class="topbar-btn-icon" aria-label="评论">C</button>
        <button class="topbar-btn-icon" id="btn-new-post" aria-label="新建文章">+</button>
        <button class="topbar-btn" id="btn-logout" data-i18n="logout">Logout</button>
        <div class="topbar-user" id="user-avatar">AL</div>
      </div>
    </div>

    <!-- Bottom: Brand -->
    <div class="hero-bottom">
      <div class="brand-name">
        BiRan INEV
        <span>BLOG</span>
      </div>
      <div></div>
    </div>
  </section>

  <!-- ========== Articles Section ========== -->
  <main class="articles-section">
    <div class="articles-list" id="articles-list"></div>
  </main>

  <!-- ========== Login Modal ========== -->
  <div class="modal-overlay" id="login-modal">
    <div class="modal-card">
      <h2 class="modal-title" data-i18n="login">Login</h2>
      <div class="form-group">
        <input type="text" class="form-input" id="input-username"
               data-i18n-placeholder="username" placeholder="Username" autocomplete="username">
      </div>
      <div class="form-group">
        <input type="password" class="form-input" id="input-password"
               data-i18n-placeholder="password" placeholder="Password" autocomplete="current-password">
      </div>
      <div class="modal-actions">
        <button class="btn-modal-cancel" id="btn-modal-cancel" data-i18n="cancel">Cancel</button>
        <button class="btn-modal-login" id="btn-modal-submit" data-i18n="login">Login</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
