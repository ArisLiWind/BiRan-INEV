<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>BiRan INEV</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="index">

  <!-- ========== Hero Section - Guest State ========== -->
  <section class="hero" id="hero-guest">
    <!-- Background: CSS Black Hole Gradient -->
    <div class="hero-bg">
      <div class="hero-bg-gradient"></div>
    </div>

    <!-- Top: Close button -->
    <div class="hero-top">
      <button class="btn-close-white" aria-label="关闭">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round">
          <line x1="6" y1="6" x2="18" y2="18"></line>
          <line x1="18" y1="6" x2="6" y2="18"></line>
        </svg>
      </button>
    </div>

    <!-- Bottom: Brand + Actions -->
    <div class="hero-bottom">
      <div class="brand-name">
        BiRan INEV
        <span>BLOG</span>
      </div>
      <div class="hero-actions">
        <button class="btn-circle" aria-label="评论">C</button>
        <button class="btn-login" id="btn-open-login">登录</button>
      </div>
    </div>
  </section>

  <!-- ========== Hero Section - Logged-in State ========== -->
  <section class="hero hidden" id="hero-logged">
    <!-- Background: CSS Black Hole Gradient -->
    <div class="hero-bg">
      <div class="hero-bg-gradient"></div>
    </div>

    <!-- Top bar overlay -->
    <div class="hero-topbar-logged">
      <div class="topbar-brand">BiRan INEV</div>
      <div class="topbar-actions">
        <button class="topbar-btn-icon" aria-label="评论">C</button>
        <button class="topbar-btn-icon" id="btn-new-post" aria-label="新建文章">+</button>
        <button class="topbar-btn" id="btn-logout">退出</button>
        <div class="topbar-user" id="user-avatar">AL</div>
      </div>
    </div>

    <!-- Bottom: Brand -->
    <div class="hero-bottom">
      <div class="brand-name">
        BiRan INEV
        <span>BLOG</span>
      </div>
      <div></div>
    </div>
  </section>

  <!-- ========== Articles Section ========== -->
  <main class="articles-section">
    <div class="articles-list" id="articles-list">
      <!-- Articles rendered by JavaScript -->
    </div>
  </main>

  <!-- ========== Login Modal ========== -->
  <div class="modal-overlay" id="login-modal">
    <div class="modal-card">
      <h2 class="modal-title">登录</h2>
      <div class="form-group">
        <input
          type="text"
          class="form-input"
          id="input-username"
          placeholder="用户名"
          autocomplete="username"
        >
      </div>
      <div class="form-group">
        <input
          type="password"
          class="form-input"
          id="input-password"
          placeholder="密码"
          autocomplete="current-password"
        >
      </div>
      <div class="modal-actions">
        <button class="btn-modal-cancel" id="btn-modal-cancel">取消</button>
        <button class="btn-modal-login" id="btn-modal-submit">登录</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
